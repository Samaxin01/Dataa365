<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- App Information -->
    <title>Data365 - Task & Earn Data</title>
    <meta name="description" content="Complete simple tasks and earn mobile data with Data365.">
    <meta name="theme-color" content="#6C3BFF">

    <!-- Mobile App Feel -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #FFFFFF;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .logo {
            width: 95px;
            height: 95px;
            background: #6C3BFF;
            color: white;
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            font-weight: 700;
            margin: auto;
            box-shadow: 
                0 15px 35px rgba(108, 59, 255, 0.35);
            
            animation: float 2s ease-in-out infinite;
        }

        h1 {
            margin-top: 18px;
            color: #6C3BFF;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            color: #757575;
            font-size: 14px;
            margin-top: 5px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="logo-container">

        <div class="logo">
            D
        </div>

        <h1>Data365</h1>

        <p>
            Your data reward journey begins
        </p>

    </div>


<script>

    // Give users a smooth app opening animation
    window.addEventListener("load", () => {

        setTimeout(() => {

            window.location.replace("/loader");

        }, 2500);

    });

</script>

</body>

</html>
